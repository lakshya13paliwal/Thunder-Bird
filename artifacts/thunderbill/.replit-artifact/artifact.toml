kind = "web"
previewPath = "/"
title = "ThunderBill ⚡"
version = "1.0.0"
id = "artifacts/thunderbill"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22319
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/thunderbill run dev"

[services.env]
PORT = "22319"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/thunderbill", "run", "build"]
publicDir = "artifacts/thunderbill/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
